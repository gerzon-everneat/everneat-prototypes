<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neatlist — Auth (Mobile)</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  body { background: #f0f0f0; display: flex; justify-content: center; padding: 24px 0; min-height: 100vh; }
  .phone { width: 390px; min-height: 844px; background: var(--white); border-radius: 48px; box-shadow: 0 32px 80px rgba(0,0,0,0.18); overflow: hidden; }
  .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
  .status-time { font-size: 15px; font-weight: 700; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .screen { padding: 0 24px 40px; }

  /* HEADER */
  .auth-header { padding: 12px 0 28px; text-align: center; }
  .auth-logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 7px; margin-bottom: 28px; }
  .auth-logo-dot { width: 8px; height: 8px; background: var(--lime); border-radius: 50%; }
  .auth-tabs { display: flex; background: var(--bg-secondary); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 28px; }
  .auth-tab { flex: 1; text-align: center; padding: 9px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--fg-muted); transition: var(--transition); }
  .auth-tab.active { background: var(--white); color: var(--black); box-shadow: var(--shadow-sm); }

  .auth-heading { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; text-align: left; }
  .auth-sub { font-size: 14px; color: var(--fg-muted); margin-bottom: 24px; text-align: left; }
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-wrapper { position: relative; }
  .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--fg-subtle); display: flex; align-items: center; }
  input { padding: 12px 14px; font-size: 15px; }
  .phone-prefix { display: flex; }
  .phone-prefix select { width: 90px; border-right: none; border-radius: var(--radius-sm) 0 0 var(--radius-sm); flex-shrink: 0; font-size: 13px; }
  .phone-prefix input { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .forgot { font-size: 13px; color: var(--fg-muted); text-align: right; display: block; margin: -6px 0 16px; text-decoration: none; }
  .btn-full { width: 100%; justify-content: center; padding: 14px; font-size: 15px; border-radius: var(--radius); }
  .auth-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
  .auth-divider span { font-size: 12px; color: var(--fg-subtle); }
  .auth-divider::before, .auth-divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .social-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 13px; border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; background: var(--white); color: var(--fg); margin-bottom: 10px; }
  .auth-switch { text-align: center; font-size: 13px; color: var(--fg-muted); margin-top: 20px; }
  .auth-switch a { color: var(--black); font-weight: 700; text-decoration: none; }

  /* home indicator */
  .home-indicator { height: 34px; display: flex; align-items: center; justify-content: center; }
  .home-bar { width: 134px; height: 5px; background: var(--black); border-radius: 3px; opacity: 0.2; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <span class="status-icons">
      <i data-lucide="signal" style="width:14px;height:14px;"></i>
      <i data-lucide="wifi" style="width:14px;height:14px;"></i>
      <i data-lucide="battery-full" style="width:14px;height:14px;"></i>
    </span>
  </div>
  <div class="screen">
    <div class="auth-logo"><div class="auth-logo-dot"></div>Neatlist</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showLogin()">Log in</div>
      <div class="auth-tab" onclick="showRegister()">Sign up</div>
    </div>

    <!-- LOGIN -->
    <div id="login-form">
      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub">Log in to your account</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" placeholder="Your password" />
          <span class="input-icon"><i data-lucide="eye" style="width:18px;height:18px;"></i></span>
        </div>
      </div>
      <a href="#" class="forgot">Forgot password?</a>
      <a href="onboarding-employer-mobile.html" class="btn btn-primary btn-full">Log in</a>
      <div class="auth-divider"><span>or</span></div>
      <button class="social-btn"><i data-lucide="globe" style="width:16px;height:16px;"></i> Continue with Google</button>
      <button class="social-btn"> Apple</button>
      <div class="auth-switch">No account? <a href="#" onclick="showRegister()">Sign up free</a></div>
    </div>

    <!-- REGISTER -->
    <div id="register-form" style="display:none">
      <h2 class="auth-heading">Create account</h2>
      <p class="auth-sub">Start hiring or finding work</p>
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" placeholder="Maria" />
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" placeholder="Santos" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" placeholder="Create a password" />
          <span class="input-icon"><i data-lucide="eye" style="width:18px;height:18px;"></i></span>
        </div>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <div class="phone-prefix">
          <select><option>🇺🇸 +1</option><option>🇬🇧 +44</option><option>🇵🇭 +63</option></select>
          <input type="tel" placeholder="555 000 0000" />
        </div>
      </div>
      <a href="onboarding-employer-mobile.html" class="btn btn-primary btn-full" style="margin-bottom:10px">Create account</a>
      <div class="auth-divider"><span>or</span></div>
      <button class="social-btn"><i data-lucide="globe" style="width:16px;height:16px;"></i> Continue with Google</button>
      <div class="auth-switch">Have an account? <a href="#" onclick="showLogin()">Log in</a></div>
    </div>
  </div>
  <div class="home-indicator"><div class="home-bar"></div></div>
</div>
<script>
function showLogin() {
  document.getElementById('login-form').style.display='block';
  document.getElementById('register-form').style.display='none';
  document.querySelectorAll('.auth-tab')[0].classList.add('active');
  document.querySelectorAll('.auth-tab')[1].classList.remove('active');
}
function showRegister() {
  document.getElementById('login-form').style.display='none';
  document.getElementById('register-form').style.display='block';
  document.querySelectorAll('.auth-tab')[0].classList.remove('active');
  document.querySelectorAll('.auth-tab')[1].classList.add('active');
}
</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
</body>
</html>
